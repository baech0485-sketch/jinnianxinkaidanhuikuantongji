name: 部署静态站点

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 准备部署产物
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp -r daily-dashboard dist/daily-dashboard
          touch dist/.nojekyll

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
