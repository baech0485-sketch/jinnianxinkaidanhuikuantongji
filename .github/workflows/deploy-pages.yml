name: 部署静态站点

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 准备部署产物
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp -r daily-dashboard dist/daily-dashboard
          touch dist/.nojekyll

      - name: 发布到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
